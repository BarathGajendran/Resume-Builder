kind = "web"
previewPath = "/"
title = "Elegance Resume Builder"
version = "1.0.0"
id = "artifacts/elegance-resume"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25884

[services.development]
run = "pnpm --filter @workspace/elegance-resume run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elegance-resume", "run", "build" ]
serve = "static"
publicDir = "artifacts/elegance-resume/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25884"
BASE_PATH = "/"
